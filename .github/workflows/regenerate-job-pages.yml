name: Regenerate job pages

on:
  push:
    branches: [main]
    paths:
      - "assets/data/jobs.json"

permissions:
  contents: write

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Regenerate recruit/*.html from jobs.json
        run: node scripts/regenerate-pages.js

      - name: Commit changes if any
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add recruit/*.html
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: recruit/*.html を jobs.json から自動再生成"
            git push
          fi
