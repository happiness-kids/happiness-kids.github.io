name: Regenerate job pages

on:
  push:
    branches: [main]
    paths:
      - "assets/data/jobs.json"
      - "assets/data/profile.json"
      - "assets/js/job-html-template.js"
  schedule:
    # 求人の掲載終了日が過ぎたページを noindex 化するため毎日実行する
    - cron: "0 0 * * *"

permissions:
  contents: write

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Regenerate recruit/*.html from jobs.json
        run: node scripts/regenerate-pages.js

      - name: Commit changes if any
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A recruit/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: recruit/*.html を jobs.json から自動再生成"
            git push
          fi
